name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-release-check:
    name: Linux release checklist
    runs-on: ubuntu-latest
    steps:
      - name: Check out backup
        uses: actions/checkout@v4
        with:
          path: backup
      - name: Check out project_tools sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/project_tools
          path: project_tools
      - name: Check out zlib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zlib
          path: zlib
      - name: Check out sshlib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sshlib
          path: sshlib
      - name: Check out cryptolib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/cryptolib
          path: cryptolib
      - name: Check out HttpClient sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HttpClient
          path: httpclient
      - name: Check out terminal_styles sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/terminal_styles
          path: terminal_styles
      - name: Check out i18n sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/i18n
          path: i18n
      - name: Check out hostkit sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hostkit
          path: hostkit
      - name: Set up Alire
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild
      - name: Install GNATprove
        # The release checker runs "alr exec -- gnatprove -P backup_spark.gpr". gnatprove is
        # a regular Alire crate, not a toolchain component, so it installs separately rather
        # than via the toolchain field -- and apt has no reliable gnatprove package.
        run: |
          alr install gnatprove
          echo "$HOME/.alire/bin" >> "$GITHUB_PATH"
      - name: Install Ada toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gnat gprbuild fish zsh
          # httpclient's C bridges include <openssl/...> and backup links -lssl -lcrypto.
          sudo apt-get install -y libssl-dev
          command -v pwsh || sudo snap install powershell --classic
          pwsh -NoProfile -NonInteractive -Command '$PSVersionTable.PSVersion'
      - name: Build backup
        # Also generates the Alire config projects for backup and its path-pinned siblings --
        # including project_tools' config/project_tools_config.gpr, which the release checker's
        # tools.gpr withs. The raw "gprbuild -P tools/tools.gpr" below does not generate it, so
        # without a build first it failed on a missing project file. And nothing else built
        # backup on Linux at all, so this is where a Linux build regression would now surface.
        working-directory: backup
        run: alr --non-interactive build
      - name: Build release checker
        working-directory: backup
        run: alr exec -- gprbuild -P tools/tools.gpr
      - name: Run release checker
        working-directory: backup
        env:
          BACKUP_S3_COMPAT_REMOTE: ${{ secrets.BACKUP_S3_COMPAT_REMOTE }}
          BACKUP_S3_COMPAT_ENDPOINT: ${{ secrets.BACKUP_S3_COMPAT_ENDPOINT }}
          BACKUP_S3_COMPAT_REGION: ${{ secrets.BACKUP_S3_COMPAT_REGION }}
          BACKUP_S3_COMPAT_ACCESS_KEY_ENV: BACKUP_S3_COMPAT_ACCESS_KEY
          BACKUP_S3_COMPAT_SECRET_KEY_ENV: BACKUP_S3_COMPAT_SECRET_KEY
          BACKUP_S3_COMPAT_ACCESS_KEY: ${{ secrets.BACKUP_S3_COMPAT_ACCESS_KEY }}
          BACKUP_S3_COMPAT_SECRET_KEY: ${{ secrets.BACKUP_S3_COMPAT_SECRET_KEY }}
          BACKUP_S3_COMPAT_ADDRESSING: ${{ secrets.BACKUP_S3_COMPAT_ADDRESSING }}
          BACKUP_S3_COMPAT_SSE: ${{ secrets.BACKUP_S3_COMPAT_SSE }}
          BACKUP_S3_COMPAT_KMS_KEY_ID: ${{ secrets.BACKUP_S3_COMPAT_KMS_KEY_ID }}
          BACKUP_GOOGLE_DRIVE_COMPAT_REMOTE: ${{ secrets.BACKUP_GOOGLE_DRIVE_COMPAT_REMOTE }}
          BACKUP_GOOGLE_DRIVE_COMPAT_TOKEN_ENV: BACKUP_GOOGLE_DRIVE_COMPAT_TOKEN
          BACKUP_GOOGLE_DRIVE_COMPAT_TOKEN: ${{ secrets.BACKUP_GOOGLE_DRIVE_COMPAT_TOKEN }}
          BACKUP_GOOGLE_DRIVE_COMPAT_REFRESH_TOKEN: ${{ secrets.BACKUP_GOOGLE_DRIVE_COMPAT_REFRESH_TOKEN }}
          BACKUP_GOOGLE_DRIVE_COMPAT_CLIENT_ID: ${{ secrets.BACKUP_GOOGLE_DRIVE_COMPAT_CLIENT_ID }}
          BACKUP_GOOGLE_DRIVE_COMPAT_CLIENT_SECRET: ${{ secrets.BACKUP_GOOGLE_DRIVE_COMPAT_CLIENT_SECRET }}
          BACKUP_GOOGLE_DRIVE_COMPAT_TOKEN_URI: ${{ secrets.BACKUP_GOOGLE_DRIVE_COMPAT_TOKEN_URI }}
          BACKUP_GOOGLE_DRIVE_COMPAT_SUPPORTS_ALL_DRIVES: ${{ secrets.BACKUP_GOOGLE_DRIVE_COMPAT_SUPPORTS_ALL_DRIVES }}
          BACKUP_GOOGLE_DRIVE_COMPAT_DRIVE_ID: ${{ secrets.BACKUP_GOOGLE_DRIVE_COMPAT_DRIVE_ID }}
          BACKUP_PCLOUD_COMPAT_REMOTE: ${{ secrets.BACKUP_PCLOUD_COMPAT_REMOTE }}
          BACKUP_PCLOUD_COMPAT_PATH_REMOTE: ${{ secrets.BACKUP_PCLOUD_COMPAT_PATH_REMOTE }}
          BACKUP_PCLOUD_COMPAT_TOKEN_ENV: BACKUP_PCLOUD_COMPAT_TOKEN
          BACKUP_PCLOUD_COMPAT_TOKEN: ${{ secrets.BACKUP_PCLOUD_COMPAT_TOKEN }}
          BACKUP_PCLOUD_COMPAT_API_BASE: ${{ secrets.BACKUP_PCLOUD_COMPAT_API_BASE }}
          BACKUP_PCLOUD_COMPAT_REGION: ${{ secrets.BACKUP_PCLOUD_COMPAT_REGION }}
          BACKUP_PCLOUD_COMPAT_STRICT: ${{ vars.BACKUP_PCLOUD_COMPAT_STRICT }}
        run: tools/bin/check_all

  windows-build-check:
    name: Windows native build check
    runs-on: windows-latest
    steps:
      - name: Check out backup
        uses: actions/checkout@v4
        with:
          path: backup
      - name: Check out project_tools sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/project_tools
          path: project_tools
      - name: Check out zlib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zlib
          path: zlib
      - name: Check out sshlib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sshlib
          path: sshlib
      - name: Check out cryptolib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/cryptolib
          path: cryptolib
      - name: Check out HttpClient sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HttpClient
          path: httpclient
      - name: Check out terminal_styles sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/terminal_styles
          path: terminal_styles
      - name: Check out i18n sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/i18n
          path: i18n
      - name: Check out hostkit sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hostkit
          path: hostkit
      - name: Set up Alire
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild
      - name: Install OpenSSL (Windows)
        shell: bash
        run: |
          # httpclient's C bridges include <openssl/...> and backup links -lssl -lcrypto.
          # Alire's GNAT is mingw-w64, so it needs the mingw OpenSSL from MSYS2 -- headers to
          # compile the bridges, import libraries to link them. The keyring on the runner goes
          # stale; refresh it, and fall back to an unsigned sync if the signed one will not go.
          pacman() { /c/msys64/usr/bin/pacman "$@"; }
          pacman-key() { /c/msys64/usr/bin/pacman-key "$@"; }
          pacman-key --init || true
          pacman-key --populate msys2 || true

          sync() { pacman -Sy --noconfirm --needed --disable-download-timeout "$@" mingw-w64-x86_64-openssl; }
          synced=""
          for attempt in 1 2 3; do
            if sync; then synced=yes; break; fi
            echo "::warning::pacman sync attempt ${attempt} failed"; sleep 15
          done
          if [ -z "$synced" ]; then
            sed 's/^SigLevel.*/SigLevel = Never/' /c/msys64/etc/pacman.conf > /c/msys64/tmp/pacman-nosig.conf
            for attempt in 1 2 3; do
              if sync --config C:/msys64/tmp/pacman-nosig.conf; then synced=yes; break; fi
              echo "::warning::unsigned pacman sync attempt ${attempt} failed"; sleep 15
            done
          fi
          [ -n "$synced" ] || { echo "::error::could not install OpenSSL"; exit 1; }

          # CPATH for the C bridge headers, LIBRARY_PATH for the link, PATH for the DLLs the
          # test binary loads at startup.
          echo "CPATH=C:/msys64/mingw64/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=C:/msys64/mingw64/lib" >> "$GITHUB_ENV"
          echo "C:\\msys64\\mingw64\\bin" >> "$GITHUB_PATH"
      - name: Build backup on Windows
        working-directory: backup
        run: alr build
      - name: Build tests on Windows
        working-directory: backup/tests
        run: alr build
      - name: Run active tests on Windows
        working-directory: backup/tests
        run: .\bin\tests.exe
      - name: Run HTTP remote live tests on Windows
        working-directory: backup/tests
        run: .\bin\backup_http_remote_live_tests.exe


  macos-build-check:
    name: macOS native build check
    # macos-latest is arm64, and gnat_native=15.2.1 ships no aarch64-darwin binary, so
    # Alire cannot resolve the pin there. macos-15-intel is the x86_64 image.
    runs-on: macos-15-intel
    steps:
      - name: Check out backup
        uses: actions/checkout@v4
        with:
          path: backup
      - name: Check out project_tools sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/project_tools
          path: project_tools
      - name: Check out zlib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zlib
          path: zlib
      - name: Check out sshlib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sshlib
          path: sshlib
      - name: Check out cryptolib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/cryptolib
          path: cryptolib
      - name: Check out HttpClient sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HttpClient
          path: httpclient
      - name: Check out terminal_styles sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/terminal_styles
          path: terminal_styles
      - name: Check out i18n sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/i18n
          path: i18n
      - name: Check out hostkit sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hostkit
          path: hostkit
      - name: Set up Alire
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild
      - name: Build backup on macOS
        working-directory: backup
        run: alr build
      - name: Build tests on macOS
        working-directory: backup/tests
        run: alr build
      - name: Run active tests on macOS
        working-directory: backup/tests
        run: ./bin/tests
      - name: Run HTTP remote live tests on macOS
        working-directory: backup/tests
        run: ./bin/backup_http_remote_live_tests
