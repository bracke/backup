# command modes: name|selector|positionals|notes
mode|create|default|OUT.zip INPUT...|creates a local archive; may combine with --catalog FILE for post-run indexing
mode|list|--list ARCHIVE.zip|none|lists an existing archive; --list-json emits machine-readable output
mode|verify|--verify ARCHIVE.zip|none|verifies an existing archive; may combine with --catalog FILE to update trust state
mode|extract|--extract ARCHIVE.zip|none|requires --output-dir DIR and restore options only
mode|remote-upload|--upload --remote URL|OUT.zip INPUT...|creates a local archive and uploads it after creation
mode|remote-sync|--sync --remote URL|OUT.zip INPUT...|creates a local archive and reconciles managed remote objects
mode|remote-restore|--restore-remote --remote URL|LOCAL.zip|downloads a remote archive to a local path
mode|catalog|--catalog FILE plus catalog command|none|requires exactly one catalog command and no one-shot backup options
mode|job|--run-job FILE or --create-job FILE|none|job management commands are mutually exclusive with one-shot backup options
mode|pcloud-oauth|--pcloud-oauth-url CLIENT_ID REDIRECT_URI|none|prints a pCloud OAuth authorization URL and exits
mode|pcloud-token|--pcloud-oauth-token CLIENT_ID CLIENT_SECRET CODE REDIRECT_URI [API_BASE]|none|exchanges a pCloud OAuth authorization code, prints token JSON and config hints, and exits
mode|proton-drive-login|--proton-drive-login SESSION_FILE USER_ADDRESS USERNAME PASSWORD_PROOF [MFA_CODE] [SESSION_LABEL] [APP_VERSION] [API_BASE]|none|runs the configured Proton Drive auth provider flow, updates the session descriptor, and exits
mode|pcloud-clean-temp|--pcloud-clean-temp --remote URL|none|deletes stale backup-managed pCloud temporary upload objects and exits
mode|pcloud-check|--pcloud-check --remote URL|none|checks pCloud auth, account region, quota metadata, and configured namespace
# command conflict groups: name|rule|members|diagnostic
conflict|catalog-command|exactly-one|--index --query --list-archives --list-contents --verify-catalog|choose exactly one catalog command
conflict|job-command|at-most-one|--run-job --create-job|choose only one job management command
conflict|remote-direction|restore-exclusive|--upload --sync --restore-remote|remote restore cannot be combined with upload or sync
conflict|restore-conflict-policy|at-most-one|--skip-existing --overwrite --rename-existing|choose only one restore conflict policy
# help catalog/order lines: enum_name|catalog_key|role|text
help|Title|help.title|Header|backup {version}
help|Usage|help.usage|Info|usage:
help|Create|help.create|Muted|  backup [options] OUT.zip INPUT...
help|List|help.list|Muted|  backup --list ARCHIVE.zip [--list-json]
help|Verify|help.verify|Muted|  backup --verify ARCHIVE.zip [--list-json]
help|Extract|help.extract|Muted|  backup --extract ARCHIVE.zip --output-dir DIR [restore options]
help|Job|help.job|Muted|  backup --run-job FILE or --create-job FILE
help|Common|help.common|Info|common options:
help|Common_Line1|help.common.line1|Muted|  --manifest --deterministic --compression=auto/store/deflate/bzip2/lzma/ppmd/zstd
help|Common_Line2|help.common.line2|Muted|  --ignore FILE --prefix PATH --max-file-size N --max-total-size N
help|Common_Line3|help.common.line3|Muted|  --encrypt --password-file FILE or --password-env NAME or --password-prompt
help|Restore|help.restore|Info|restore options:
help|Restore_Line1|help.restore.line1|Muted|  --only PATH --exclude PATH --skip-existing --overwrite --rename-existing
help|Remote|help.remote|Muted|remote/catalog options are documented in README.md; use --help-advanced for a full option summary
help|Diagnostics|help.diagnostics|Info|diagnostics:
help|Json_Errors|help.json_errors|Muted|  --json-errors emit machine-readable failure diagnostics
help|Advanced|help.advanced|Info|advanced options:
