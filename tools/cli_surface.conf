# Shared backup CLI surface model.
# option|long|short|kind|values|description
option|help|h|none||Show help
option|help-advanced||none||Show advanced help
option|version||none||Show version
option|manifest||none||Write manifest
option|deterministic||none||Use deterministic metadata
option|dry-run||none||Plan without writing archive
option|list||file||List archive contents
option|list-json||none||Emit JSON listing
option|verify||file||Verify archive
option|extract||file||Extract archive
option|output-dir||file||Restore output directory
option|only||text||Restore only path
option|exclude||text||Exclude restore path
option|skip-existing||none||Leave existing files
option|overwrite||none||Overwrite existing regular files
option|rename-existing||none||Rename existing files
option|compression||enum|auto store deflate bzip2 lzma ppmd zstd|Compression mode
option|symlinks||enum|skip store-link follow|Symlink handling
option|ignore||file||Ignore file
option|prefix||text||Archive prefix
option|max-file-size||text||Maximum file size
option|max-total-size||text||Maximum total size
option|encrypt||none||Encrypt output
option|password-file||file||Password file
option|password-env||env||Password environment variable
option|password-prompt||none||Prompt for password
option|cipher||enum|aes256-gcm|Encryption cipher
option|catalog||file||Catalog file
option|index||file||Catalog index file
option|query||text||Catalog query
option|list-archives||none||List catalog archives
option|list-contents||none||List catalog contents
option|verify-catalog||none||Verify catalog index
option|remote||text||Remote URL
option|remote-config||file||Remote config file
option|upload||none||Upload archive
option|sync||none||Sync remote namespace
option|restore-remote||none||Download remote archive
option|remote-require-encrypted||none||Require encrypted remote archives
option|remote-resume||none||Resume remote transfer
option|create-job||file||Write job file
option|run-job||file||Run job file
option|job||file||Run job file
option|retention-policy||enum|count: daily: weekly: monthly: tiered:|Retention policy
